[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.04/platform-espressif32.zip
board = esp32dev
framework = arduino
lib_deps = 
	okalachev/FlixPeriph@^1.10.2
	okalachev/MAVLink@^2.0.27
    https://github.com/mikeshub/FUTABA_SBUS.git

build_flags = -DWIFI_ENABLED=1

